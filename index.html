<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum CTA – Extraordinary Button</title>
  <meta name="description" content="A self-contained, extraordinary CSS call-to-action button with spinning aurora border, glassmorphism, and pulse rings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       HOUDINI @property — enables animating custom angle/number
       values. Supported in Chrome 85+, Edge 85+, Safari 16.4+
    ============================================================ */
    @property --spin   { syntax: '<angle>';  inherits: false; initial-value: 0deg; }
    @property --hue-a  { syntax: '<number>'; inherits: false; initial-value: 258;  }

    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --violet:   hsl(258, 100%, 65%);
      --magenta:  hsl(308, 100%, 58%);
      --cyan:     hsl(185, 100%, 55%);
      --gold:     hsl(45,  100%, 62%);

      --btn-radius:   18px;
      --btn-pad:      20px 54px;
      --border-w:     2px;

      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ============================================================
       GLOBAL RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       COSMIC PAGE
    ============================================================ */
    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #06060f;
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    /* Nebula glow layers */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 45%, hsla(258,85%,22%,.50) 0%, transparent 70%),
        radial-gradient(ellipse 60% 55% at 85% 25%, hsla(308,85%,20%,.40) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 50% 90%, hsla(185,85%,18%,.35) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Pure-CSS star field */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at  5%  8%, rgba(255,255,255,.85), transparent),
        radial-gradient(1px 1px at 12% 33%, rgba(255,255,255,.65), transparent),
        radial-gradient(1px 1px at 20% 14%, rgba(255,255,255,.90), transparent),
        radial-gradient(1px 1px at 28% 70%, rgba(255,255,255,.55), transparent),
        radial-gradient(1px 1px at 36% 45%, rgba(255,255,255,.75), transparent),
        radial-gradient(1px 1px at 44% 22%, rgba(255,255,255,.80), transparent),
        radial-gradient(1px 1px at 51% 60%, rgba(255,255,255,.60), transparent),
        radial-gradient(1px 1px at 59% 12%, rgba(255,255,255,.90), transparent),
        radial-gradient(1px 1px at 66% 80%, rgba(255,255,255,.50), transparent),
        radial-gradient(1px 1px at 73% 37%, rgba(255,255,255,.70), transparent),
        radial-gradient(1px 1px at 81% 55%, rgba(255,255,255,.80), transparent),
        radial-gradient(1px 1px at 89% 18%, rgba(255,255,255,.65), transparent),
        radial-gradient(1px 1px at 95% 73%, rgba(255,255,255,.90), transparent),
        radial-gradient(2px 2px at  8% 90%, rgba(255,255,255,.40), transparent),
        radial-gradient(2px 2px at 23% 56%, rgba(255,255,255,.35), transparent),
        radial-gradient(2px 2px at 40% 88%, rgba(255,255,255,.45), transparent),
        radial-gradient(2px 2px at 61% 42%, rgba(255,255,255,.40), transparent),
        radial-gradient(2px 2px at 78% 92%, rgba(255,255,255,.35), transparent),
        radial-gradient(2px 2px at 91% 10%, rgba(255,255,255,.50), transparent),
        /* Coloured stars */
        radial-gradient(2px 2px at 17% 75%, hsla(258,100%,80%,.65), transparent),
        radial-gradient(2px 2px at 53% 29%, hsla(185,100%,80%,.55), transparent),
        radial-gradient(2px 2px at 70% 64%, hsla(308,100%,80%,.60), transparent);
      pointer-events: none;
      animation: twinkle 5s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: .55; }
      to   { opacity: 1.00; }
    }

    /* ============================================================
       STAGE LAYOUT
    ============================================================ */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 60px 32px;
      text-align: center;
    }

    /* Eyebrow label */
    .eyebrow {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--violet), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Hero headline */
    .headline {
      font-size: clamp(2.4rem, 6.5vw, 4.4rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -.035em;
      background: linear-gradient(
        140deg,
        #fff 0%,
        rgba(255,255,255,.88) 38%,
        hsl(258,100%,82%) 65%,
        hsl(308,100%,76%) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 680px;
    }

    .subline {
      font-size: 1rem;
      font-weight: 400;
      color: rgba(255,255,255,.40);
      max-width: 440px;
      line-height: 1.75;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      margin-top: 24px;
    }

    /* ============================================================
       PULSE-RING WRAPPER
       Two expanding rings radiate from behind the button.
    ============================================================ */
    .btn-wrap {
      position: relative;
      display: inline-flex;
    }

    .btn-wrap::before,
    .btn-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: calc(var(--btn-radius) + 10px);
      border: 1px solid var(--violet);
      opacity: 0;
      pointer-events: none;
      animation: pulse-ring 2.8s var(--ease-out) infinite;
    }

    .btn-wrap::after {
      animation-delay: 1.4s;
      border-color: var(--magenta);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: .65; }
      75%  { opacity: 0; }
      100% { transform: scale(1.45); opacity: 0;   }
    }

    /* ============================================================
       THE QUANTUM BUTTON
    ============================================================ */
    .cta-btn {
      /* Layout */
      position: relative;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: var(--btn-pad);
      border-radius: var(--btn-radius);
      border: none;

      /* Glassmorphism fill */
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);

      /* Typography */
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .04em;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;

      /* Soft inner rim + idle glow */
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.14),
        0 8px 48px -6px hsla(258,100%,62%,.55),
        0 2px 8px rgba(0,0,0,.45);

      /* Motion */
      transition:
        background     .35s var(--ease-spring),
        box-shadow     .35s ease,
        transform      .40s var(--ease-spring),
        letter-spacing .25s ease;

      cursor: pointer;
      user-select: none;
      will-change: transform, box-shadow;

      /* Idle breathing animation */
      animation: breathe 3.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,.14),
          0  8px 48px -6px hsla(258,100%,62%,.55),
          0  2px  8px rgba(0,0,0,.45);
      }
      50% {
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,.22),
          0 14px 64px  0px hsla(308,100%,62%,.70),
          0  4px 16px rgba(0,0,0,.55);
      }
    }

    /* ── Spinning aurora border via ::before ────────────
       inset: -2px makes it 2px larger on every side.
       The button's own background covers the centre,
       leaving only that 2px ring visible as the border.
    ─────────────────────────────────────────────────── */
    .cta-btn::before {
      content: '';
      position: absolute;
      inset: calc(var(--border-w) * -1);
      border-radius: calc(var(--btn-radius) + var(--border-w));
      background: conic-gradient(
        from var(--spin),
        var(--violet),
        var(--cyan),
        var(--magenta),
        var(--gold),
        var(--violet)
      );
      z-index: -2;
      animation: spin-border 4s linear infinite;
    }

    @keyframes spin-border { to { --spin: 360deg; } }

    /* ── Dark glass backing + shimmer layer via ::after ─ */
    .cta-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: calc(var(--btn-radius) - 1px);
      /* Two backgrounds stacked:
         1) moving shimmer highlight
         2) deep glass base       */
      background:
        linear-gradient(
          110deg,
          transparent 30%,
          rgba(255,255,255,.18) 50%,
          transparent 70%
        ),
        rgba(8, 4, 26, .72);
      background-size: 260% 100%, 100% 100%;
      background-position: 180% center, 0 0;
      background-repeat: no-repeat, no-repeat;
      z-index: -1;
      transition: background-position .55s ease;
    }

    /* Shimmer sweeps across on hover */
    .cta-btn:hover::after {
      background-position: -80% center, 0 0;
    }

    /* ── Hover ─────────────────────────────────────────── */
    .cta-btn:hover {
      background: rgba(255,255,255,.13);
      transform: translateY(-4px) scale(1.04);
      letter-spacing: .06em;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.20),
        0 20px 72px -4px hsla(308,100%,62%,.75),
        0  6px 24px rgba(0,0,0,.55);
      animation-play-state: paused; /* freeze breathe during hover */
    }

    /* Arrow nudges right on hover */
    .cta-btn:hover .btn-icon { transform: translateX(5px); }

    /* ── Active / pressed ──────────────────────────────── */
    .cta-btn:active {
      transform: translateY(-1px) scale(.975);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.12),
        0  4px 24px -4px hsla(258,100%,62%,.50),
        0  1px  6px rgba(0,0,0,.40);
      transition-duration: .12s;
    }

    .cta-btn:active .btn-icon { transform: translateX(2px); }

    /* ── Focus-visible (keyboard / a11y) ───────────────── */
    .cta-btn:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 5px;
    }

    /* ── Animated icon ─────────────────────────────────── */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      transition: transform .4s var(--ease-spring);
    }

    /* ── Label text ────────────────────────────────────── */
    .btn-label {
      position: relative;
      display: inline-block;
    }

    /* ============================================================
       GHOST / OUTLINE VARIANT
    ============================================================ */
    .cta-btn--ghost {
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow:
        inset 0 0 0 1.5px rgba(255,255,255,.25),
        0 4px 20px rgba(0,0,0,.3);
      animation: none;
    }

    .cta-btn--ghost::before {
      /* Dimmer border for the ghost variant */
      opacity: .6;
      animation-duration: 7s;
    }

    .cta-btn--ghost:hover {
      background: rgba(255,255,255,.08);
    }

    /* ============================================================
       SMALL VARIANT
    ============================================================ */
    .cta-btn--sm {
      font-size: .875rem;
      padding: 13px 32px;
      --btn-radius: 12px;
    }

    /* ============================================================
       DIVIDER LABEL
    ============================================================ */
    .variant-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
      margin-top: 20px;
    }

    /* ============================================================
       LIGHT-BG DEMO STRIP
       Proves the button reads on a white surface too.
    ============================================================ */
    .light-strip {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.96);
      border-radius: 24px;
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 48px rgba(0,0,0,.18);
    }

    .light-strip p {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #aaa;
    }

    /* On the light strip we override the dark glass backing */
    .light-strip .cta-btn::after {
      background:
        linear-gradient(110deg, transparent 30%, rgba(255,255,255,.4) 50%, transparent 70%),
        rgba(255,255,255,.15);
      background-size: 260% 100%, 100% 100%;
      background-position: 180% center, 0 0;
      background-repeat: no-repeat, no-repeat;
    }

    .light-strip .cta-btn {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.30),
        0 8px 36px -6px hsla(258,100%,55%,.45),
        0 2px 8px rgba(0,0,0,.15);
    }

    .light-strip .cta-btn:hover {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.30),
        0 16px 56px -2px hsla(308,100%,55%,.55),
        0 4px 16px rgba(0,0,0,.18);
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 520px) {
      .cta-btn { width: 100%; padding-left: 28px; padding-right: 28px; }
      .btn-row  { flex-direction: column; align-items: center; }
    }

    /* ============================================================
       REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .cta-btn,
      .cta-btn::before,
      .cta-btn::after,
      .btn-icon,
      .btn-wrap::before,
      .btn-wrap::after,
      body::after {
        animation: none !important;
        transition: none !important;
        transform: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="stage">

    <p class="eyebrow">Pure CSS · No JavaScript · W3C Valid</p>

    <h1 class="headline">
      The Button,<br />Reimagined.
    </h1>

    <p class="subline">
      Spinning aurora border, glassmorphism fill, shimmer sweep,
      pulsing energy rings — every state crafted to perfection.
    </p>

    <!-- ── Primary buttons ── -->
    <div class="btn-row">

      <!-- PRIMARY CTA -->
      <div class="btn-wrap">
        <a
          href="https://btn-example.raj6366363.workers.dev/"
          class="cta-btn"
          id="cta-primary"
          aria-label="Get started – primary action"
        >
          <span class="btn-label">Get Started</span>
          <span class="btn-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </a>
      </div>

      <!-- GHOST VARIANT -->
      <div class="btn-wrap">
        <a
          href="https://btn-example.raj6366363.workers.dev/"
          class="cta-btn cta-btn--ghost"
          id="cta-ghost"
          aria-label="Learn more – secondary action"
        >
          <span class="btn-label">Learn More</span>
          <span class="btn-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </span>
        </a>
      </div>

    </div>

    <p class="variant-label">Small variant</p>

    <!-- SMALL VARIANT -->
    <div class="btn-wrap">
      <a
        href="https://example.com/demo"
        class="cta-btn cta-btn--sm"
        id="cta-small"
        aria-label="View live demo"
      >
        <span class="btn-label">Live Demo</span>
        <span class="btn-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </span>
      </a>
    </div>

    <!-- ── Light-background proof ── -->
    <div class="light-strip">
      <p>Also stunning on light backgrounds</p>
      <div class="btn-wrap">
        <a
          href="https://example.com/signup"
          class="cta-btn"
          id="cta-light"
          aria-label="Sign up free on light background"
        >
          <span class="btn-label">Sign Up Free</span>
          <span class="btn-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </span>
        </a>
      </div>
    </div>

  </div>

</body>
</html>
